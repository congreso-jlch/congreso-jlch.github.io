<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>III Congreso de la Asociación de Jóvenes Lingüistas de Chile 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Paleta cromática institucional */
        :root {
            --color-lila: #9282ac;
            --color-verde: #b6bb69;
            --color-crema: #f9f6e5;
            --color-oscuro: #261e2d;
            --blanco: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Fuerza el fondo morado en toda la página */
        html, body {
            background-color: var(--color-lila) !important;
            color: var(--color-crema);
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
        }

        /* Barra de Navegación */
        header {
            position: sticky;
            top: 0;
            background-color: var(--color-oscuro);
            border-bottom: 4px solid var(--color-verde);
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .logo-texto {
            font-weight: 700;
            font-size: 1rem;
            color: var(--color-crema);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--color-crema);
            font-size: 0.85rem;
            font-weight: 600;
            transition: color 0.2s;
        }

        .nav-menu a:hover {
            color: var(--color-verde);
        }

        /* Banner Principal - CUBRE TODO EL ANCHO DE LA PÁGINA */
        .hero-banner-full {
            width: 100%;
            background-color: var(--color-oscuro);
            text-align: center;
            border-bottom: 5px solid var(--color-verde);
        }

        .hero-img {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* Respaldo si la imagen no se encuentra */
        .banner-backup {
            padding: 60px 20px;
            background-color: var(--color-oscuro);
        }
        .banner-backup h1 {
            font-size: 2.2rem;
            color: var(--color-crema);
            text-transform: uppercase;
        }

        /* Contenedor de Secciones */
        .section {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
            scroll-margin-top: 90px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-crema);
            margin-bottom: 25px;
            border-left: 5px solid var(--color-verde);
            padding-left: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Tarjetas Académicas con Contraste Oscuro */
        .card-academica {
            background-color: rgba(38, 30, 45, 0.75) !important;
            border: 1px solid rgba(249, 246, 229, 0.2);
            border-radius: 8px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        p {
            margin-bottom: 15px;
            font-size: 1rem;
        }

        /* Bloque de Alerta de Plazos */
        .alerta-cronograma {
            background-color: var(--color-verde);
            color: var(--color-oscuro);
            padding: 18px;
            border-radius: 4px;
            font-weight: 700;
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 35px;
            letter-spacing: 0.5px;
        }

        /* Estructura en Doble Columna */
        .grid-dinamico {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .card-columna {
            background-color: rgba(38, 30, 45, 0.5);
            border: 1px solid rgba(249, 246, 229, 0.15);
            border-radius: 6px;
            padding: 30px;
        }

        .card-columna h3 {
            color: var(--color-crema);
            margin-bottom: 15px;
            font-size: 1.25rem;
            border-bottom: 2px solid var(--color-verde);
            padding-bottom: 5px;
        }

        .card-columna ul {
            padding-left: 20px;
            margin: 15px 0;
        }

        .card-columna li {
            margin-bottom: 10px;
        }

        /* Tabla de Aranceles */
        .tabla-valores {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            background-color: rgba(255, 255, 255, 0.05);
        }

        .tabla-valores th, .tabla-valores td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid rgba(249, 246, 229, 0.2);
        }

        .tabla-valores th {
            background-color: rgba(38, 30, 45, 0.9);
            color: var(--color-crema);
        }
